name: Deploy to EKS

on:
  workflow_run:
    workflows:
      - Build and Push Docker Image
      - Simple Docker Build
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: myimage

jobs:
  deploy:
    name: Deploy manifest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${{ secrets.EKS_CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      - name: Render Kubernetes manifest
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          sed "s|DOCKER_IMAGE_PLACEHOLDER|${IMAGE}|g" deployment.yml > rendered-deployment.yml

      - name: Apply Kubernetes manifest
        run: kubectl apply -f rendered-deployment.yml
