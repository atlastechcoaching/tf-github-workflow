<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terraform GitHub Actions Demo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f6f8fa;
      color: #24292f;
    }

    main {
      width: min(680px, calc(100% - 32px));
      padding: 32px;
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(140, 149, 159, 0.18);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Terraform GitHub Actions Demo</h1>
    <p>This container was built from the teaching repository and can be deployed to Kubernetes after the image is pushed.</p>
    <p>Use it to demonstrate Docker builds, GitHub Actions secrets, and Kubernetes rollouts.</p>
  </main>
</body>
</html>
